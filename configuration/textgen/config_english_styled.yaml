# Configuration for the text generation tool

# Google API Key for Gemini
api_key: ...

# The target language for text generation (e.g., "English", "Polish", "Spanish")
language: "English"

# Style guidelines for text generation
style:
  - "I know many teams, believe me. But this one is something special."
  - "A vast range of tax introduced by the previous government! I will stop that!"

# Number of entries to generate in a single LLM request
batch_size: 20

# Wait time (in seconds) between two consecutive requests to avoid rate limits
timeout: 10

# Maximum number of words allowed for different generation types
word_limits:
  single_sentence: 25  # Word limit for statements, questions, and exclamations
  multi_sentence: 50   # Total word limit for multi-sentence texts

# Probabilities for selecting each generation class (should sum up to 1.0)
probabilities:
  statements: 0.2     # Chance of generating simple statement sentences
  questions: 0.15       # Chance of generating diverse questions
  exclamations: 0.15    # Chance of generating emotive exclamations
  multi_sentence: 0.5  # Chance of generating short multi-sentence texts

# How probable it is for a generated sentence to be styled.
style_prob: 1.0

# Output file paths for saving the generated data for each class
output_paths:
  statements: "data/raw/english/statements.txt"
  questions: "data/raw/english/questions.txt"
  exclamations: "data/raw/english/exclamations.txt"
  multi_sentence: "data/raw/english/multi_sentence.txt"
